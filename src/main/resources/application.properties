spring.application.name=school-management-api

spring.datasource.url=jdbc:postgresql://localhost:5432/school
spring.datasource.username=admin
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=

spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

jwt.secret=change-this-secret-key-change-this-secret-key-123456
jwt.expiration-ms=30000

app.admin.email=admin@example.com
app.admin.password=123456789


app.frontend.host=http://localhost:8025

app.recover.password.token.duration=24
app.verify.email.token.duration=24